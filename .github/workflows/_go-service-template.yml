name: "Go Service Template"

on:
  workflow_call:
    inputs:
      service_path:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      # - name: Run Tests with Race Detector
      #   run: |
      #     cd ${{ inputs.service_path }}
      #     go test -v -race ./...

      # O flag -coverprofile gera o relatório que o badge vai ler
      - name: Run Tests with Race Detector
        run: |
          cd ${{ inputs.service_path }}
          go test -v -race -coverprofile=coverage.out ./...

      - name: Go Coverage Badge
        uses: ncruces/go-coverage-report@v0
        with:
          report: 'services/accounts/coverage.out'
          chart: true # Gera um gráfico visual se quiser
          amend: true # Atualiza o badge no commit atual
        if: github.event_name == 'push' # Só atualiza o badge em pushes na main