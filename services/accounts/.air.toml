root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Comando para compilar o seu serviço específico
  cmd = "go build -o ./tmp/main ./services/accounts/cmd/accounts-svc/main.go"
  
  # O binário que o Air deve executar após o build
  bin = "./tmp/main"
  
  # Extensões que o Air deve vigiar
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  
  # Pastas para ignorar (evita loops infinitos de rebuild)
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin"]
  
  # O Air para o processo antigo antes de iniciar o novo
  stop_on_error = true
  
  # Intervalo de tempo para considerar mudanças (debounce)
  delay = 1000 # ms

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"